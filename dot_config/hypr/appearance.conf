##################
### APPEARANCE ###
##################

$ANIMATION_PATH=./animations/hyper-modern.conf
source = $ANIMATION_PATH

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2
    col.active_border = rgba(a9c8ffcc) rgba(7fb0ffcc) 35deg
    col.inactive_border = rgba(5f739ccc)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2
    active_opacity = 0.92
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 14
        render_power = 3
        color = rgba(04060cb0)
    }

    blur {
        enabled = true
        size = 3
        passes = 3
        xray = true
        ignore_opacity = false
        new_optimizations = true
        noise = 0.011
        contrast = 1.05
        brightness = 0.92
        vibrancy = 0.14
        special = true
        popups = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

xwayland {
    force_zero_scaling = true
}

