#########################
### WINDOW MANAGEMENT ###
#########################

bind = $mainMod, Q, killactive,
# bind = ALT, F4, killactive,
# bind = $mainMod, Delete, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, layoutmsg, togglesplit # dwindle
# bind = $mainMod, P, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 95% 95%; dispatch centerwindow"
# bind = $mainMod, G, togglegroup
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, O, exec, ~/.config/rofi/powermenu.sh
# bind = $mainMod, O, exec, $lockCmd
# bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod, N, exec, swaync-client -t
# bind = CTRL ALT, Delete, exec, ~/.config/rofi/powermenu.sh
bind = $mainMod CTRL, SPACE, exec, killall -SIGUSR1 waybar

# bind = $mainMod CTRL, H, changegroupactive, b
# bind = $mainMod CTRL, L, changegroupactive, f

bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = ALT, Tab, cyclenext

binde = $mainMod SHIFT, Right, resizeactive, 30 0
binde = $mainMod SHIFT, Left, resizeactive, -30 0
binde = $mainMod SHIFT, Up, resizeactive, 0 -30
binde = $mainMod SHIFT, Down, resizeactive, 0 30
binde = $mainMod SHIFT, L, resizeactive, 30 0
binde = $mainMod SHIFT, H, resizeactive, -30 0
binde = $mainMod SHIFT, K, resizeactive, 0 -30
binde = $mainMod SHIFT, J, resizeactive, 0 30

# Move floating windows by pixels, otherwise move tiled windows by direction.
$moveactivewindow = grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binde = $mainMod SHIFT CTRL, left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
binde = $mainMod SHIFT CTRL, right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
binde = $mainMod SHIFT CTRL, up, exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
binde = $mainMod SHIFT CTRL, down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, U, togglesplit


################
### LAUNCHERS ###
################

bind = $mainMod, T, exec, $terminal
# bind = $mainMod ALT, T, exec, [float; move 20% 5%; size 60% 60%] $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $browser

bind = $mainMod, A, exec, pkill -x rofi || $launcher
bind = $mainMod, TAB, exec, pkill -x rofi || $windowSwitcher


#######################
### HARDWARE / MEDIA ###
#######################

bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


######################
### SCREENSHOTTING ###
######################

# Requires hyprshot.
bind = , F7, exec, hyprshot -m region -c
bind = ALT, F7, exec, hyprshot -m region --freeze -c
bindl = SHIFT, F7, exec, hyprshot -m output -c


