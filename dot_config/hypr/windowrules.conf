##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# windowrule {
#     name = move-hyprland-run
#     match:class = hyprland-run

#     move = 20 monitor_h-120
#     float = yes
# }

windowrule {
    name = move-discord-to-scratchpad
    match:class = ^(?i)discord$

    # Move Discord to special workspace "qaq" without switching to it
    workspace = special:qaq silent
}

misc {
    on_focus_under_fullscreen = 1
}
