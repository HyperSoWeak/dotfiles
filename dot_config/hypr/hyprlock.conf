# ================================
#  Hyprlock
# ================================
$font_display = JetBrainsMono Nerd Font
$font_ui = Noto Sans
$font_text = Noto Sans

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 4, linear
    animation = fadeOut, 1, 4, linear
    animation = inputFieldDots, 1, 2, linear
}

# Use the current screen as the base so the lock screen always matches
# whatever wallpaper or workspace is visible when you lock.
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 15
    noise = 0.0117
    contrast = 1.0
    brightness = 0.64
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

# Uncomment this and comment the screenshot block above if you want a fixed wallpaper:
# background {
#     monitor =
#     path = /home/hyper/weak/wallpapers/blue-flow.jpg
#     blur_passes = 1
#     blur_size = 2
# }

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 132
    font_family = $font_display
    color = rgb(f4f7ff)

    position = 0, 244
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A · %d %B %Y"
    font_size = 22
    font_family = $font_text
    color = rgb(a6b4d4)

    position = 0, 96
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] /home/hyper/.local/bin/hyprlock-battery
    font_size = 18
    font_family = $font_display
    color = rgb(c9d5ef)

    position = 0, 100
    halign = center
    valign = bottom
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    rounding = 14

    outer_color = rgba(9fe0ff52) rgba(7a88cf5a) 45deg
    inner_color = rgba(121b2abf)
    font_color = rgb(eef3ff)

    check_color = rgba(4fd6becf)
    fail_color = rgba(ff757fcf)
    capslock_color = rgba(e0af68cf)
    numlock_color = rgba(86e1fccf)

    # fade_on_empty = false
    placeholder_text = unlock
    fail_text = $PAMFAIL

    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true
    dots_rounding = -1

    font_family = $font_ui
    position = 0, 184
    halign = center
    valign = bottom
}
