"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 900
scan_timeout = 25

format = """
$os\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$fill\
$python\
$nodejs\
$rust\
$golang\
$deno\
$docker_context\
$cmd_duration\
$jobs\
$line_break\
$character"""

right_format = "$time"

palette = "hyper"

[palettes.hyper]
surface = "#1f2335"
overlay = "#2a2f45"
text = "#c8d3f5"
muted = "#7a88cf"
blue = "#82aaff"
cyan = "#86e1fc"
teal = "#4fd6be"
green = "#a6da95"
yellow = "#e0af68"
orange = "#ff966c"
red = "#ff757f"
purple = "#c099ff"

[fill]
symbol = " "

[character]
success_symbol = "[ÔØ»](bold teal)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold yellow)"
vimcmd_visual_symbol = "[ÔØ«](bold purple)"
vimcmd_replace_symbol = "[ÔØ«](bold red)"
vimcmd_replace_one_symbol = "[ÔØ«](bold red)"

[os]
disabled = false
style = "fg:muted"
format = "[$symbol]($style) "

[os.symbols]
Arch = "¾░úç"
Macos = "¾░ÇÁ"
Ubuntu = "¾░òê"
Debian = "¾░úÜ"
Fedora = "¾░úø"
NixOS = "¾▒äà"
Unknown = "¾░áÑ"

[hostname]
ssh_only = true
style = "fg:yellow"
format = "[@$hostname]($style) "

[directory]
style = "bold fg:text"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥"
read_only_style = "fg:red"
home_symbol = "~"

[directory.substitutions]
"~/ntu" = "¾░æ┤ ntu"
"~/weak" = "¾░òÑ weak"
"~/utils" = "¾░åì utils"
"~/Downloads" = "´ÇÖ downloads"

[git_branch]
symbol = "´Éÿ "
style = "bold fg:teal"
format = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "ÔÇª"

[git_status]
style = "fg:yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£ÿ${count}"

[git_state]
style = "fg:yellow"
format = '([$state( $progress_current/$progress_total)]($style) )'

[python]
symbol = "¯£╝ "
style = "fg:green"
format = '[$symbol$version( ($virtualenv))]($style) '
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "uv.lock"]

[nodejs]
symbol = "¾░ÄÖ "
style = "fg:orange"
format = '[$symbol$version]($style) '
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock", "package-lock.json"]

[rust]
symbol = "¯×¿ "
style = "fg:red"
format = '[$symbol$version]($style) '
detect_extensions = ["rs"]

[golang]
symbol = "¯ÿº "
style = "fg:cyan"
format = '[$symbol$version]($style) '
detect_extensions = ["go"]

[deno]
symbol = "¯ƒÇ "
style = "fg:muted"
format = '[$symbol$version]($style) '

[docker_context]
symbol = "´êƒ "
style = "fg:blue"
format = '[$symbol$context]($style) '
only_with_files = false
detect_files = ["docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml", "Dockerfile"]

[cmd_duration]
min_time = 1200
show_milliseconds = false
style = "fg:muted"
format = "[┬À $duration]($style) "

[jobs]
symbol = "¾░úû "
style = "fg:purple"
number_threshold = 1
format = "[$symbol$number]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[$time]($style)"
