"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 900
scan_timeout = 25

format = """
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$deno\
$docker_context\
$line_break\
$cmd_duration\
$jobs\
$container\
$character"""

palette = "macchiato"

[palettes.macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[character]
success_symbol = "[‚ĚĪ](bold lavender)"
error_symbol = "[‚ĚĪ](bold red)"
vimcmd_symbol = "[‚Ěį](bold mauve)"
vimcmd_visual_symbol = "[‚Ěį](bold pink)"
vimcmd_replace_symbol = "[‚Ěį](bold maroon)"
vimcmd_replace_one_symbol = "[‚Ěį](bold maroon)"

[hostname]
ssh_only = true
style = "fg:peach"
format = "[@$hostname]($style) "

[directory]
style = "bold fg:text"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "‚Ä¶/"
before_repo_root_style = "fg:overlay1"
repo_root_style = "bold fg:text"
repo_root_format = "[ÔźĀ ](fg:overlay1)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
read_only = " ůįĆĺ"
read_only_style = "fg:red"
home_symbol = "~"

[git_branch]
symbol = "Ôźė "
style = "bold fg:mauve"
format = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "‚Ä¶"

[git_status]
style = "fg:red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count}"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "‚úė${count}"

[git_state]
style = "fg:maroon"
format = '([$state( $progress_current/$progress_total)]($style) )'

[python]
symbol = "Óúľ "
style = "fg:yellow"
format = '[$symbol$version( ($virtualenv))]($style) '
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "uv.lock"]

[nodejs]
symbol = "ůįéô "
style = "fg:green"
format = '[$symbol$version]($style) '
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock", "package-lock.json"]

[rust]
symbol = "Óě® "
style = "fg:peach"
format = '[$symbol$version]($style) '
detect_extensions = ["rs"]

[golang]
symbol = "Óėß "
style = "fg:blue"
format = '[$symbol$version]($style) '
detect_extensions = ["go"]

[deno]
symbol = "ÓüÄ "
style = "fg:teal"
format = '[$symbol$version]($style) '

[docker_context]
symbol = "Ôąü "
style = "fg:sapphire"
format = '[$symbol$context]($style) '
only_with_files = false
detect_files = ["docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml", "Dockerfile"]

[cmd_duration]
min_time = 1200
show_milliseconds = false
style = "fg:rosewater"
format = "[ůĪéę $duration]($style) "

[jobs]
symbol = "ůį£Ė "
style = "fg:pink"
number_threshold = 1
format = "[$symbol$number]($style) "

[container]
format = "[$symbol $name]($style) "
symbol = "‚¨Ę"
style = "fg:flamingo"
