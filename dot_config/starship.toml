"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 900
scan_timeout = 25

format = """
$os\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$fill\
$python\
$nodejs\
$rust\
$golang\
$deno\
$docker_context\
$cmd_duration\
$jobs\
$line_break\
$container\
$character"""

right_format = "$time"

palette = "hyper"

[palettes.hyper]
surface = "#171b26"
overlay = "#23283a"
text = "#d8e0f8"
muted = "#8b93ad"
blue = "#8fb5ff"
cyan = "#7dd3fc"
teal = "#6ee7c8"
green = "#b7d98c"
yellow = "#d8b574"
orange = "#f3a37a"
red = "#ff8b94"
purple = "#b8a0ff"

[fill]
symbol = " "

[character]
success_symbol = "[‚ĚĮ](bold cyan)"
error_symbol = "[‚ĚĮ](bold red)"
vimcmd_symbol = "[‚Ěģ](bold orange)"
vimcmd_visual_symbol = "[‚Ěģ](bold purple)"
vimcmd_replace_symbol = "[‚Ěģ](bold red)"
vimcmd_replace_one_symbol = "[‚Ěģ](bold red)"

[os]
disabled = false
style = "bold fg:blue"
format = "[$symbol]($style) "

[os.symbols]
Arch = "ÔĆÉ "
Kali = "ÔĆß "
Ubuntu = "ÔĆú "

[hostname]
ssh_only = true
style = "fg:yellow"
format = "[@$hostname]($style) "

[directory]
style = "bold fg:text"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " ůįĆĺ"
read_only_style = "fg:red"
home_symbol = "~"

[directory.substitutions]
"~/ntu" = "ůįĎī ntu"
"~/weak" = "ůįē• weak"
"~/Downloads" = "ÔÄô downloads"

[git_branch]
symbol = "Ôźė "
style = "bold fg:teal"
format = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "‚Ä¶"

[git_status]
style = "fg:yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "=${count}"
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬Ľ${count}"
deleted = "‚úė${count}"

[git_state]
style = "fg:yellow"
format = '([$state( $progress_current/$progress_total)]($style) )'

[python]
symbol = "Óúľ "
style = "fg:yellow"
format = '[$symbol$version( ($virtualenv))]($style) '
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "uv.lock"]

[nodejs]
symbol = "ůįéô "
style = "fg:green"
format = '[$symbol$version]($style) '
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock", "package-lock.json"]

[rust]
symbol = "Óě® "
style = "fg:orange"
format = '[$symbol$version]($style) '
detect_extensions = ["rs"]

[golang]
symbol = "Óėß "
style = "fg:blue"
format = '[$symbol$version]($style) '
detect_extensions = ["go"]

[deno]
symbol = "ÓüÄ "
style = "fg:purple"
format = '[$symbol$version]($style) '

[docker_context]
symbol = "Ôąü "
style = "fg:cyan"
format = '[$symbol$context]($style) '
only_with_files = false
detect_files = ["docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml", "Dockerfile"]

[cmd_duration]
min_time = 1200
show_milliseconds = false
style = "fg:yellow"
format = "[ůĪéę $duration]($style) "

[jobs]
symbol = "ůį£Ė "
style = "fg:purple"
number_threshold = 1
format = "[$symbol$number]($style) "

[container]
format = "[$symbol $name]($style) "
symbol = "‚¨Ę"
style = "bold fg:orange"

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[$time]($style)"
